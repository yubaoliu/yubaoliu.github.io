### Build settings
markdown: kramdown
#highlighter: pygments
kramdown:
        input: GFM
        syntax_highlighter: rouge
        parse_block_html: true
plugins: 
    - jekyll-paginate
    - jekyll-toc
    - sass
    - jekyll-paginate
    - jekyll-sitemap
    - jekyll-admin
    - jekyll-seo-tag
    - jekyll-figure
    - jekyll-feed
    - jekyll-gist
    - jekyll-coffeescript
    - jemoji
    - jekyll-redirect-from
toc:
    min_level: 1
    max_level: 3
    no_toc_section_class: no_toc_section
    list_class: section-nav
    sublist_class: ''
    item_class: toc-entry
    item_prefix: toc-

paginate: 20
# excerpt_separator: <!-- more -->

defaults:
  - scope:
      path: "img"
    values:
      image: true
